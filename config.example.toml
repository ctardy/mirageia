# ~/.mirageia/config.toml
# MirageIA configuration — all options are optional.
# Copy this file to ~/.mirageia/config.toml and uncomment the desired lines.

[proxy]
# listen_addr = "127.0.0.1:3100"              # Proxy listening address
# anthropic_base_url = "https://api.anthropic.com"
# openai_base_url = "https://api.openai.com"
# log_level = "info"                           # debug, info, warn, error
# add_header = false                           # Add X-MirageIA: active header
# fail_open = true                             # Forward request if pseudonymization fails
# passthrough = false                          # Passthrough mode: relay without pseudonymizing
# upstream_proxy = "http://proxy.corp:8080"    # Corporate proxy for outbound requests (env: MIRAGEIA_UPSTREAM_PROXY)
# danger_accept_invalid_certs = false          # Accept corporate MITM certificates — use if proxy does SSL inspection (env: MIRAGEIA_DANGER_ACCEPT_INVALID_CERTS)

[detection]
# confidence_threshold = 0.75                  # Detection confidence threshold (0.0-1.0)
# whitelist = [                                # Terms to never pseudonymize
#     "localhost",
#     "127.0.0.1",
#     "example.com",
#     "Thomas Edison",
# ]
